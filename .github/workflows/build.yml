 name: Build
 
 on:
   push:
     branches: [main]
   pull_request:
     branches: [main]
 
 jobs:
   build:
     runs-on: macos-latest
     steps:
       - uses: actions/checkout@v4
 
       - name: Install XcodeGen
         run: brew install xcodegen
 
       - name: Generate Xcode project
         run: xcodegen generate
 
       - name: Build + Package .ipa (no signing, TrollStore)
         run: |
           xcodebuild build \
             -project TwitterHD.xcodeproj \
             -scheme TwitterHD \
             -sdk iphoneos \
             -configuration Release \
             -derivedDataPath DerivedData \
             CODE_SIGNING_ALLOWED=NO \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGN_STYLE=Manual 2>&1 | tee build.log
 
       - name: Package .ipa
         run: |
           mkdir -p Payload
           cp -r DerivedData/Build/Products/Release-iphoneos/TwitterHD.app Payload/
           zip -r TwitterHD.ipa Payload/
           rm -rf Payload
 
       - name: Upload artifacts
         uses: actions/upload-artifact@v4
         with:
           name: TwitterHD-unsigned
           path: |
             TwitterHD.ipa
             build.log
