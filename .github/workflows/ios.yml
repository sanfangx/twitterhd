name: iOS Build & Package (.ipa)

on:
  push:
    branches: [ "main", "master", "feature/**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (.ipa)
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build iOS App (Unsigned Release)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project TweetImageDownloader.xcodeproj \
            -scheme TweetImageDownloader \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build/Release-iphoneos | tee build.log

      - name: Commit Build Log on Failure
        if: failure()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp build.log build_error.log
          git add -f build_error.log
          git commit -m "ci: upload build_error.log [skip ci]" || true
          git push origin HEAD:feature/bg-and-history || true

      - name: Package .ipa File (Payload)
        run: |
          mkdir -p Payload
          cp -R build/Release-iphoneos/TweetImageDownloader.app Payload/
          zip -qr TweetImageDownloader.ipa Payload

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TweetImageDownloader-iOS-IPA
          path: TweetImageDownloader.ipa
          retention-days: 30
